<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Todo</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #333; }
        a { color: #0066cc; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .btn { display: inline-block; padding: 6px 14px; border-radius: 4px; border: none; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #0066cc; color: white; }
        .btn-danger { background: #cc2200; color: white; }
        .btn-secondary { background: #888; color: white; }
        input[type=text] { width: 100%; padding: 8px; box-sizing: border-box; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>
    <h1><a href="{% url 'index' %}">Todo List</a></h1>
    {% block content %}{% endblock %}
</body>
</html>
