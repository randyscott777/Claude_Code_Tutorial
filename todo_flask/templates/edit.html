{% extends "base.html" %}
{% block title %}Edit Todo — TodoList{% endblock %}

{% block content %}
<div class="form-container">
  <h2>Edit Todo</h2>
  <form action="{{ url_for('edit', todo_id=todo['id']) }}" method="post">
    <div class="form-group">
      <label for="title">Title <span class="required">*</span></label>
      <input type="text" id="title" name="title" value="{{ todo['title'] }}" required>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" name="description" rows="3">{{ todo['description'] or '' }}</textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="priority">Priority</label>
        <select id="priority" name="priority">
          <option value="low" {% if todo['priority'] == 'low' %}selected{% endif %}>Low</option>
          <option value="medium" {% if todo['priority'] == 'medium' %}selected{% endif %}>Medium</option>
          <option value="high" {% if todo['priority'] == 'high' %}selected{% endif %}>High</option>
        </select>
      </div>

      <div class="form-group">
        <label for="due_date">Due Date</label>
        <input type="date" id="due_date" name="due_date" value="{{ todo['due_date'] or '' }}">
      </div>
    </div>

    <div class="form-actions">
      <a class="btn btn-secondary" href="{{ url_for('index') }}">Cancel</a>
      <button type="submit" class="btn btn-primary">Save Changes</button>
    </div>
  </form>
</div>
{% endblock %}
