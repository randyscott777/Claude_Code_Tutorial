{% extends "base.html" %}
{% block title %}Edit Todo{% endblock %}

{% block content %}
<div class="app-header">
  <h1>✏️ Edit Todo</h1>
  <a class="btn-secondary" href="{{ url_for('index') }}">← Back</a>
</div>

<div class="form-card">
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post">
    <div class="field">
      <label>Title</label>
      <input type="text" name="title" value="{{ todo.title }}" required autofocus>
    </div>
    <div class="field">
      <label>Description</label>
      <textarea name="description">{{ todo.description or '' }}</textarea>
    </div>
    <div class="field">
      <label>Status</label>
      <select name="status">
        {% for s in statuses %}
          <option value="{{ s }}" {% if todo.status == s %}selected{% endif %}>{{ s }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field">
      <label>Priority</label>
      <select name="priority">
        {% for p in priorities %}
          <option value="{{ p }}" {% if todo.priority == p %}selected{% endif %}>{{ p }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field">
      <label>Due Date</label>
      <input type="date" name="due_date" value="{{ todo.due_date or '' }}">
    </div>
    <div class="form-actions">
      <button class="btn-primary" type="submit">Save</button>
      <a class="btn-secondary" href="{{ url_for('index') }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
